<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Commute">
<title>Commute Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3e;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --accent3: #a8ff78;
    --text: #f0f0ff;
    --text-dim: #7070a0;
    --danger: #ff4466;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
  }

  .app {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    padding: 52px 24px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
    color: var(--accent);
  }

  .logo span { color: var(--text-dim); font-weight: 400; }

  .date-display {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Tabs */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    gap: 0;
  }

  .tab {
    flex: 1;
    padding: 14px 0;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* Views */
  .view { display: none; flex: 1; overflow-y: auto; padding: 24px; }
  .view.active { display: block; }

  /* ── TRACK VIEW ── */
  .status-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .stat-item label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    display: block;
    margin-bottom: 4px;
  }

  .stat-item .value {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .stat-item .value.accent { color: var(--accent); }
  .stat-item .value.green { color: var(--accent3); }
  .stat-item .unit {
    font-size: 12px;
    color: var(--text-dim);
    margin-left: 3px;
  }

  /* Big button */
  .track-btn-wrap {
    display: flex;
    justify-content: center;
    margin: 28px 0;
  }

  .track-btn {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #00e5ff22, #00e5ff44);
    border: 2px solid var(--accent);
    color: var(--accent);
    box-shadow: 0 0 40px #00e5ff22, inset 0 0 30px #00e5ff11;
  }

  .track-btn.recording {
    background: linear-gradient(135deg, #ff446622, #ff446644);
    border-color: var(--danger);
    color: var(--danger);
    box-shadow: 0 0 40px #ff446622, inset 0 0 30px #ff446611;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 40px #ff446622, inset 0 0 30px #ff446611; }
    50% { box-shadow: 0 0 70px #ff446644, inset 0 0 40px #ff446622; }
  }

  .track-btn-icon { font-size: 40px; line-height: 1; }

  .track-btn:active { transform: scale(0.95); }

  /* Live info */
  .live-info {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    display: none;
  }

  .live-info.visible { display: block; }

  .live-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .live-row:last-child { border-bottom: none; }

  .live-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .live-val {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--accent);
  }

  .gps-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 16px;
    letter-spacing: 0.5px;
  }

  .gps-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
  }

  .gps-dot.active {
    background: var(--accent3);
    box-shadow: 0 0 8px var(--accent3);
    animation: blink 1.5s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── HISTORY VIEW ── */
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  /* Chart */
  .chart-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 24px;
  }

  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }

  .chart-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--text);
  }

  .chart-sub {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .chart-avg {
    text-align: right;
  }

  .chart-avg-val {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--accent);
  }

  .chart-avg-label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .bars-wrap {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 100px;
    position: relative;
  }

  .bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    height: 100%;
    gap: 4px;
    cursor: pointer;
  }

  .bar {
    width: 100%;
    border-radius: 3px 3px 0 0;
    background: var(--accent);
    opacity: 0.7;
    min-height: 3px;
    transition: opacity 0.2s;
    position: relative;
  }

  .bar.fastest { opacity: 1; background: var(--accent3); }
  .bar.slowest { opacity: 1; background: var(--accent2); }
  .bar:hover, .bar-col:hover .bar { opacity: 1; }

  .bar-label {
    font-size: 8px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .chart-legend {
    display: flex;
    gap: 16px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
  }

  /* Day of week breakdown */
  .dow-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 24px;
  }

  .dow-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 8px;
    text-align: center;
  }

  .dow-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .dow-val {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--text);
    line-height: 1;
  }

  .dow-val.best { color: var(--accent3); }
  .dow-val.worst { color: var(--accent2); }

  .dow-sub {
    font-size: 9px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* Trip list */
  .trip-list { display: flex; flex-direction: column; gap: 10px; }

  .trip-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .trip-card:active { border-color: var(--accent); }

  .trip-left {}

  .trip-date {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--text);
  }

  .trip-time {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .trip-right { text-align: right; }

  .trip-duration {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: var(--accent);
    line-height: 1;
  }

  .trip-dist {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .trip-badge {
    display: inline-block;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 20px;
    margin-top: 4px;
    font-weight: 600;
  }

  .trip-badge.fast { background: #a8ff7820; color: var(--accent3); border: 1px solid #a8ff7840; }
  .trip-badge.slow { background: #ff6b3520; color: var(--accent2); border: 1px solid #ff6b3540; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .empty-icon { font-size: 48px; margin-bottom: 16px; }

  .empty-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--text);
    margin-bottom: 8px;
  }

  .empty-sub { font-size: 13px; line-height: 1.6; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    transition: transform 0.3s ease;
    z-index: 100;
    box-shadow: 0 8px 32px #00000060;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="logo">COMMUTE<span>.track</span></div>
      <div class="date-display" id="headerDate"></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('track')">Track</button>
    <button class="tab" onclick="switchTab('history')">History</button>
  </div>

  <!-- TRACK VIEW -->
  <div class="view active" id="view-track">

    <!-- Stats bar -->
    <div class="status-bar">
      <div class="stat-item">
        <label>Total trips</label>
        <div class="value accent" id="statTotal">0</div>
      </div>
      <div class="stat-item">
        <label>Avg duration</label>
        <div class="value" id="statAvg">—<span class="unit">min</span></div>
      </div>
      <div class="stat-item">
        <label>This week</label>
        <div class="value" id="statWeek">0<span class="unit">trips</span></div>
      </div>
      <div class="stat-item">
        <label>Best time</label>
        <div class="value green" id="statBest">—<span class="unit">min</span></div>
      </div>
    </div>

    <!-- Big button -->
    <div class="track-btn-wrap">
      <button class="track-btn" id="trackBtn" onclick="toggleTracking()">
        <div class="track-btn-icon" id="trackIcon">🚗</div>
        <div id="trackLabel">START</div>
      </button>
    </div>

    <!-- GPS status -->
    <div class="gps-status">
      <div class="gps-dot" id="gpsDot"></div>
      <span id="gpsText">GPS not active</span>
    </div>

    <!-- Live info panel -->
    <div class="live-info" id="liveInfo">
      <div class="live-row">
        <span class="live-label">Elapsed</span>
        <span class="live-val" id="liveElapsed">00:00</span>
      </div>
      <div class="live-row">
        <span class="live-label">Distance</span>
        <span class="live-val" id="liveDist">0.0 km</span>
      </div>
      <div class="live-row">
        <span class="live-label">Current speed</span>
        <span class="live-val" id="liveSpeed">0 km/h</span>
      </div>
      <div class="live-row">
        <span class="live-label">Departed</span>
        <span class="live-val" id="liveDeparted">—</span>
      </div>
    </div>

  </div>

  <!-- HISTORY VIEW -->
  <div class="view" id="view-history">

    <!-- 30-day chart -->
    <div class="chart-container" id="chartContainer">
      <div class="chart-header">
        <div>
          <div class="chart-title">30-Day Overview</div>
          <div class="chart-sub" id="chartSub">—</div>
        </div>
        <div class="chart-avg">
          <div class="chart-avg-val" id="chartAvg">—</div>
          <div class="chart-avg-label">avg min</div>
        </div>
      </div>
      <div class="bars-wrap" id="barsWrap"></div>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--accent3)"></div>Fastest</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--accent2)"></div>Slowest</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--accent);opacity:0.7"></div>Regular</div>
      </div>
    </div>

    <!-- Day of week breakdown -->
    <div class="section-title">By Day of Week</div>
    <div class="dow-grid" id="dowGrid"></div>

    <!-- Trip list -->
    <div class="section-title">All Trips</div>
    <div id="tripListWrap"></div>

  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── State ──
let trips = JSON.parse(localStorage.getItem('commute_trips') || '[]');
let tracking = false;
let startTime = null;
let startCoords = null;
let lastCoords = null;
let totalDist = 0;
let watchId = null;
let timerInterval = null;
let coords = [];

// ── Helpers ──
function fmt2(n) { return String(n).padStart(2, '0'); }

function fmtTime(date) {
  return `${fmt2(date.getHours())}:${fmt2(date.getMinutes())}`;
}

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
}

function dayName(iso) {
  return new Date(iso).toLocaleDateString('en-GB', { weekday: 'short' });
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function elapsedStr(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  if (h > 0) return `${fmt2(h)}:${fmt2(m % 60)}:${fmt2(s % 60)}`;
  return `${fmt2(m)}:${fmt2(s % 60)}`;
}

function save() { localStorage.setItem('commute_trips', JSON.stringify(trips)); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Date header ──
function updateDateHeader() {
  document.getElementById('headerDate').textContent =
    new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
}

// ── Tab switching ──
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['track','history'][i] === tab);
  });
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  if (tab === 'history') renderHistory();
}

// ── Tracking ──
function toggleTracking() {
  if (!tracking) startTrip();
  else stopTrip();
}

function startTrip() {
  if (!navigator.geolocation) {
    showToast('GPS not supported on this browser');
    return;
  }

  tracking = true;
  startTime = new Date();
  totalDist = 0;
  lastCoords = null;
  coords = [];

  document.getElementById('trackBtn').classList.add('recording');
  document.getElementById('trackIcon').textContent = '⏹';
  document.getElementById('trackLabel').textContent = 'STOP';
  document.getElementById('liveInfo').classList.add('visible');
  document.getElementById('liveDeparted').textContent = fmtTime(startTime);

  const dot = document.getElementById('gpsDot');
  dot.classList.add('active');
  document.getElementById('gpsText').textContent = 'Acquiring GPS…';

  watchId = navigator.geolocation.watchPosition(
    pos => {
      const { latitude, longitude, speed } = pos.coords;
      document.getElementById('gpsText').textContent = 'GPS active — keep screen on';

      if (lastCoords) {
        const d = haversine(lastCoords.lat, lastCoords.lng, latitude, longitude);
        if (d < 0.5) totalDist += d; // filter GPS jumps
      }
      lastCoords = { lat: latitude, lng: longitude };
      coords.push({ lat: latitude, lng: longitude, t: Date.now() });

      document.getElementById('liveDist').textContent = totalDist.toFixed(2) + ' km';
      const kmh = speed ? (speed * 3.6).toFixed(0) : 0;
      document.getElementById('liveSpeed').textContent = kmh + ' km/h';
    },
    err => {
      document.getElementById('gpsText').textContent = 'GPS error: ' + err.message;
    },
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
  );

  timerInterval = setInterval(() => {
    const elapsed = Date.now() - startTime.getTime();
    document.getElementById('liveElapsed').textContent = elapsedStr(elapsed);
  }, 1000);
}

function stopTrip() {
  tracking = false;
  const endTime = new Date();

  clearInterval(timerInterval);
  if (watchId !== null) navigator.geolocation.clearWatch(watchId);

  document.getElementById('trackBtn').classList.remove('recording');
  document.getElementById('trackIcon').textContent = '🚗';
  document.getElementById('trackLabel').textContent = 'START';
  document.getElementById('liveInfo').classList.remove('visible');
  document.getElementById('gpsDot').classList.remove('active');
  document.getElementById('gpsText').textContent = 'GPS not active';

  const durationMin = Math.round((endTime - startTime) / 60000);
  if (durationMin < 1) { showToast('Trip too short — not saved'); return; }

  const trip = {
    id: Date.now(),
    date: startTime.toISOString(),
    endDate: endTime.toISOString(),
    departureTime: fmtTime(startTime),
    arrivalTime: fmtTime(endTime),
    durationMin,
    distanceKm: parseFloat(totalDist.toFixed(2)),
    dayOfWeek: startTime.toLocaleDateString('en-GB', { weekday: 'long' })
  };

  trips.unshift(trip);
  save();
  updateTrackStats();
  showToast(`Trip saved — ${durationMin} min, ${trip.distanceKm} km`);
}

// ── Track stats ──
function updateTrackStats() {
  const now = new Date();
  const weekAgo = new Date(now - 7*24*60*60*1000);

  document.getElementById('statTotal').textContent = trips.length;

  if (trips.length) {
    const avg = Math.round(trips.reduce((s, t) => s + t.durationMin, 0) / trips.length);
    const best = Math.min(...trips.map(t => t.durationMin));
    document.getElementById('statAvg').innerHTML = `${avg}<span class="unit">min</span>`;
    document.getElementById('statBest').innerHTML = `${best}<span class="unit">min</span>`;
  }

  const weekTrips = trips.filter(t => new Date(t.date) >= weekAgo);
  document.getElementById('statWeek').innerHTML = `${weekTrips.length}<span class="unit">trips</span>`;
}

// ── History ──
function renderHistory() {
  renderChart();
  renderDow();
  renderTripList();
}

function renderChart() {
  const now = new Date();
  const thirtyAgo = new Date(now - 30*24*60*60*1000);
  const recent = trips.filter(t => new Date(t.date) >= thirtyAgo);

  const wrap = document.getElementById('barsWrap');
  wrap.innerHTML = '';

  if (!recent.length) {
    document.getElementById('chartAvg').textContent = '—';
    document.getElementById('chartSub').textContent = 'No trips yet';
    wrap.innerHTML = '<div style="color:var(--text-dim);font-size:12px;width:100%;text-align:center;padding:30px 0">No data yet</div>';
    return;
  }

  document.getElementById('chartSub').textContent = `${recent.length} trips in last 30 days`;
  const avg = Math.round(recent.reduce((s,t) => s+t.durationMin,0) / recent.length);
  document.getElementById('chartAvg').textContent = avg;

  const maxDur = Math.max(...recent.map(t => t.durationMin));
  const minDur = Math.min(...recent.map(t => t.durationMin));

  // Show up to 30 bars, most recent on right
  const display = [...recent].reverse().slice(-30);

  display.forEach(trip => {
    const pct = (trip.durationMin / maxDur) * 90 + 10;
    const isFastest = trip.durationMin === minDur;
    const isSlowest = trip.durationMin === maxDur;

    const col = document.createElement('div');
    col.className = 'bar-col';
    col.title = `${fmtDate(trip.date)}: ${trip.durationMin} min`;

    const bar = document.createElement('div');
    bar.className = 'bar' + (isFastest ? ' fastest' : isSlowest ? ' slowest' : '');
    bar.style.height = pct + '%';

    const lbl = document.createElement('div');
    lbl.className = 'bar-label';
    lbl.textContent = dayName(trip.date).charAt(0);

    col.appendChild(bar);
    col.appendChild(lbl);
    wrap.appendChild(col);
  });
}

function renderDow() {
  const days = ['Mon','Tue','Wed','Thu','Fri'];
  const grid = document.getElementById('dowGrid');
  grid.innerHTML = '';

  const byDay = {};
  days.forEach(d => byDay[d] = []);

  trips.forEach(t => {
    const d = new Date(t.date).toLocaleDateString('en-GB', { weekday: 'short' });
    if (byDay[d]) byDay[d].push(t.durationMin);
  });

  // Find best/worst average
  const avgs = days.map(d => byDay[d].length
    ? byDay[d].reduce((s,v)=>s+v,0)/byDay[d].length : null);
  const validAvgs = avgs.filter(Boolean);
  const minAvg = validAvgs.length ? Math.min(...validAvgs) : null;
  const maxAvg = validAvgs.length ? Math.max(...validAvgs) : null;

  days.forEach((d, i) => {
    const arr = byDay[d];
    const avg = arr.length ? Math.round(arr.reduce((s,v)=>s+v,0)/arr.length) : null;
    const isBest = avg !== null && avg === minAvg;
    const isWorst = avg !== null && avg === maxAvg;

    const card = document.createElement('div');
    card.className = 'dow-card';

    card.innerHTML = `
      <div class="dow-name">${d}</div>
      <div class="dow-val ${isBest?'best':isWorst?'worst':''}">${avg !== null ? avg : '—'}</div>
      <div class="dow-sub">${arr.length ? arr.length + ' trips' : 'no data'}</div>
    `;
    grid.appendChild(card);
  });
}

function renderTripList() {
  const wrap = document.getElementById('tripListWrap');

  if (!trips.length) {
    wrap.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🛣️</div>
        <div class="empty-title">No trips yet</div>
        <div class="empty-sub">Hit Start on the Track tab<br>to record your first commute.</div>
      </div>`;
    return;
  }

  const minDur = Math.min(...trips.map(t => t.durationMin));
  const maxDur = Math.max(...trips.map(t => t.durationMin));

  wrap.innerHTML = '<div class="trip-list">' + trips.map(trip => {
    const badge = trip.durationMin === minDur && trips.length > 1
      ? '<div class="trip-badge fast">⚡ fastest</div>'
      : trip.durationMin === maxDur && trips.length > 1
      ? '<div class="trip-badge slow">🐢 slowest</div>'
      : '';

    return `
      <div class="trip-card">
        <div class="trip-left">
          <div class="trip-date">${fmtDate(trip.date)} · ${trip.dayOfWeek.slice(0,3)}</div>
          <div class="trip-time">${trip.departureTime} → ${trip.arrivalTime}</div>
          ${badge}
        </div>
        <div class="trip-right">
          <div class="trip-duration">${trip.durationMin}<span style="font-size:12px;color:var(--text-dim)"> min</span></div>
          <div class="trip-dist">${trip.distanceKm} km</div>
        </div>
      </div>`;
  }).join('') + '</div>';
}

// ── Init ──
updateDateHeader();
updateTrackStats();
setInterval(updateDateHeader, 60000);
</script>
